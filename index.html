<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>실기시험 제비뽑기</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="제비뽑기" />
  <meta name="theme-color" content="#3182ce" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .screen { display: none; width: 100%; max-width: 480px; padding: 20px; flex-direction: column; align-items: center; }
    .screen.active { display: flex; }

    /* ── 카테고리 선택 ── */
    .category-header { text-align: center; margin: 40px 0 32px; }
    .category-header h1 { font-size: 1.7rem; color: #1a365d; margin-bottom: 8px; }
    .category-header p { font-size: 0.95rem; color: #718096; }

    .category-list { width: 100%; display: flex; flex-direction: column; gap: 14px; }

    .category-btn {
      width: 100%; padding: 26px 24px; border: none; border-radius: 18px;
      cursor: pointer; text-align: left; display: flex; align-items: center; gap: 18px;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }
    .category-btn:active { transform: scale(0.97); }
    .category-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.13); }
    .cat-1 { background: linear-gradient(135deg, #667eea, #5a67d8); }
    .cat-2 { background: linear-gradient(135deg, #48bb78, #38a169); }
    .cat-3 { background: linear-gradient(135deg, #ed8936, #dd6b20); }
    .category-btn .cat-icon { font-size: 2.2rem; flex-shrink: 0; }
    .category-btn .cat-text { color: white; }
    .category-btn .cat-text strong { display: block; font-size: 1.15rem; margin-bottom: 3px; }
    .category-btn .cat-text span { font-size: 0.8rem; opacity: 0.85; }

    /* ── 공통 카드 ── */
    .card {
      background: white; border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      padding: 24px; width: 100%; margin-bottom: 16px;
    }
    .card h2 { font-size: 1rem; color: #4a5568; margin-bottom: 14px; border-bottom: 2px solid #e2e8f0; padding-bottom: 8px; }

    /* ── 뽑기 화면 헤더 ── */
    .draw-header { width: 100%; display: flex; align-items: center; gap: 10px; margin: 20px 0 16px; }
    .back-btn {
      background: white; border: none; border-radius: 10px; padding: 8px 12px;
      font-size: 0.9rem; color: #4a5568; cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1); flex-shrink: 0;
    }
    .back-btn:hover { background: #f7fafc; }
    .draw-header-title { flex: 1; }
    .draw-header-title h1 { font-size: 1rem; color: #718096; font-weight: normal; }
    .draw-header-title h2 { font-size: 1.2rem; color: #1a365d; font-weight: bold; }

    /* ── 설정 ── */
    .settings-grid { display: grid; gap: 10px; margin-bottom: 14px; }
    label { font-size: 0.8rem; color: #718096; display: block; margin-bottom: 4px; }
    input[type="number"], input[type="text"], input[type="password"] {
      width: 100%; padding: 10px; border: 2px solid #e2e8f0; border-radius: 8px;
      font-size: 1rem; text-align: center; outline: none; transition: border-color 0.2s;
    }
    input:focus { border-color: #4299e1; }

    /* ── 동작 목록 카드 ── */
    .item-add-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .item-add-row input { flex: 1; text-align: left; padding-left: 12px; font-size: 0.95rem; }
    .add-btn {
      padding: 10px 16px; background: #3182ce; color: white; border: none;
      border-radius: 8px; font-size: 0.9rem; font-weight: bold; cursor: pointer; white-space: nowrap;
    }
    .add-btn:hover { background: #2b6cb0; }

    .item-list { max-height: 200px; overflow-y: auto; }
    .item-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 4px; border-bottom: 1px solid #f0f0f0; gap: 8px;
    }
    .item-row:last-child { border-bottom: none; }
    .item-index { font-size: 0.75rem; color: #a0aec0; width: 20px; flex-shrink: 0; }
    .item-name { flex: 1; font-size: 0.95rem; color: #2d3748; }
    .del-btn {
      background: none; border: none; color: #fc8181; cursor: pointer;
      font-size: 1rem; padding: 2px 6px; border-radius: 4px; flex-shrink: 0;
    }
    .del-btn:hover { background: #fff5f5; }
    .item-empty { color: #a0aec0; font-size: 0.9rem; text-align: center; padding: 16px 0; }
    .item-count { font-size: 0.78rem; color: #a0aec0; margin-top: 8px; text-align: right; }

    .list-card-header {
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; user-select: none;
      border-bottom: 2px solid #e2e8f0; padding-bottom: 8px;
    }
    .list-card-header:hover { opacity: 0.75; }
    #listToggleIcon { font-size: 0.75rem; color: #a0aec0; }

    /* ── 번호 슬롯 ── */
    .student-label { text-align: center; font-size: 1.1rem; color: #2d3748; margin-bottom: 16px; font-weight: bold; }
    .slots { display: flex; justify-content: center; gap: 14px; margin-bottom: 20px; flex-wrap: wrap; }
    .slot {
      width: 80px; height: 80px; border-radius: 14px; border: 3px dashed #cbd5e0;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem; font-weight: bold; color: #a0aec0;
      background: #f7fafc; transition: all 0.3s; position: relative;
    }
    .slot.filled { border-style: solid; border-color: #4299e1; background: #ebf8ff; color: #2b6cb0; animation: popIn 0.3s ease; }
    .slot-num { position: absolute; top: 4px; left: 8px; font-size: 0.6rem; color: #90cdf4; }

    /* ── 텍스트 결과 슬롯 ── */
    .text-slots { width: 100%; display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    .text-slot {
      width: 100%; padding: 14px 16px; border-radius: 12px; border: 3px dashed #cbd5e0;
      display: flex; align-items: center; gap: 12px;
      background: #f7fafc; transition: all 0.3s;
    }
    .text-slot.filled { border-style: solid; border-color: #4299e1; background: #ebf8ff; animation: popIn 0.3s ease; }
    .text-slot-num { font-size: 0.75rem; color: #90cdf4; font-weight: bold; width: 18px; flex-shrink: 0; }
    .text-slot-value { font-size: 1.05rem; font-weight: bold; color: #2b6cb0; }
    .text-slot-placeholder { font-size: 1rem; color: #cbd5e0; }

    @keyframes popIn {
      0% { transform: scale(0.6); opacity: 0; }
      70% { transform: scale(1.05); }
      100% { transform: scale(1); opacity: 1; }
    }

    /* ── 버튼 ── */
    .draw-btn {
      width: 100%; padding: 18px; font-size: 1.2rem; font-weight: bold;
      border: none; border-radius: 12px; cursor: pointer; transition: all 0.2s; letter-spacing: 1px;
    }
    .draw-btn.active { background: linear-gradient(135deg, #3182ce, #2b6cb0); color: white; box-shadow: 0 4px 14px rgba(49,130,206,0.4); }
    .draw-btn.active:hover { transform: translateY(-2px); }
    .draw-btn.active:active { transform: translateY(0); }
    .draw-btn.disabled { background: #e2e8f0; color: #a0aec0; cursor: not-allowed; }

    .next-btn {
      width: 100%; padding: 14px; margin-top: 10px; font-size: 1rem; font-weight: bold;
      border: 2px solid #38a169; border-radius: 12px; background: white;
      color: #38a169; cursor: pointer; transition: all 0.2s;
    }
    .next-btn:hover { background: #f0fff4; }

    .reset-btn {
      width: 100%; padding: 10px; margin-top: 10px; font-size: 0.85rem;
      border: 1px solid #fc8181; border-radius: 8px; background: white;
      color: #e53e3e; cursor: pointer; transition: all 0.2s;
    }
    .reset-btn:hover { background: #fff5f5; }

    .notice { font-size: 0.78rem; color: #a0aec0; text-align: center; margin-top: 6px; }

    /* ── 기록 ── */
    .history-card .card-body { max-height: 260px; overflow-y: auto; }
    .history-row { display: flex; align-items: flex-start; padding: 8px 0; border-bottom: 1px solid #f0f0f0; gap: 10px; }
    .history-row:last-child { border-bottom: none; }
    .student-tag { background: #ebf8ff; color: #2b6cb0; border-radius: 6px; padding: 2px 8px; font-weight: bold; font-size: 0.85rem; white-space: nowrap; margin-top: 2px; }
    .history-picks { display: flex; gap: 6px; flex-wrap: wrap; }
    .pick-badge { background: #4299e1; color: white; border-radius: 8px; padding: 2px 10px; font-weight: bold; font-size: 0.85rem; }

    /* ── 모달 ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 100;
      align-items: center; justify-content: center; padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: white; border-radius: 16px; padding: 24px;
      width: 100%; max-width: 440px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.2);
    }
    .modal h3 { font-size: 1rem; color: #2d3748; margin-bottom: 6px; }
    .modal p { font-size: 0.8rem; color: #718096; margin-bottom: 10px; }
    .modal textarea {
      width: 100%; height: 180px; border: 2px solid #e2e8f0; border-radius: 8px;
      padding: 10px 12px; font-size: 0.9rem; resize: none; outline: none; font-family: inherit;
    }
    .modal textarea:focus { border-color: #4299e1; }
    .modal-btns { display: flex; gap: 8px; margin-top: 12px; }
    .modal-btns button { flex: 1; padding: 12px; border-radius: 10px; border: none; cursor: pointer; font-size: 0.95rem; font-weight: bold; }
    .btn-confirm { background: #3182ce; color: white; }
    .btn-confirm:hover { background: #2b6cb0; }
    .btn-cancel { background: #e2e8f0; color: #4a5568; }
    .btn-cancel:hover { background: #cbd5e0; }

    /* ── ⋮ 더보기 메뉴 ── */
    .more-wrap { position: relative; margin-bottom: 12px; display: flex; justify-content: flex-end; }
    .more-btn {
      background: white; border: 1.5px solid #e2e8f0; border-radius: 8px;
      padding: 6px 12px; font-size: 1.1rem; cursor: pointer; color: #4a5568; line-height: 1;
    }
    .more-btn:hover { background: #f7fafc; }
    .more-menu {
      display: none; position: absolute; top: calc(100% + 6px); right: 0;
      background: white; border-radius: 12px; box-shadow: 0 6px 24px rgba(0,0,0,0.13);
      border: 1px solid #e2e8f0; min-width: 200px; z-index: 50; overflow: hidden;
    }
    .more-menu.open { display: block; }
    .more-menu-item {
      width: 100%; padding: 12px 16px; border: none; background: white;
      text-align: left; font-size: 0.9rem; color: #2d3748; cursor: pointer;
      display: flex; align-items: center; gap: 10px;
    }
    .more-menu-item:hover { background: #f7fafc; }
    .more-menu-item.danger { color: #e53e3e; }
    .more-menu-item.danger:hover { background: #fff5f5; }
    .more-menu-divider { height: 1px; background: #e2e8f0; margin: 4px 0; }

    @media (max-width: 400px) {
      .slot { width: 65px; height: 65px; font-size: 1.3rem; }
    }
  </style>
</head>
<body>

<!-- ── 화면 1: 카테고리 선택 ── -->
<div class="screen active" id="screenCategory">
  <div class="category-header">
    <h1>🎓 실기시험 제비뽑기</h1>
    <p>과목을 선택하세요</p>
  </div>
  <div class="category-list">
    <button class="category-btn cat-1" onclick="selectCategory('신경해부생리학', 'number')">
      <span class="cat-icon">🧠</span>
      <div class="cat-text">
        <strong>신경해부생리학</strong>
        <span>신경계 해부 및 생리학</span>
      </div>
    </button>
    <button class="category-btn cat-2" onclick="selectCategory('운동치료학', 'text')">
      <span class="cat-icon">🏃</span>
      <div class="cat-text">
        <strong>운동치료학</strong>
        <span>운동 치료 및 재활</span>
      </div>
    </button>
    <button class="category-btn cat-3" onclick="selectCategory('기능해부학', 'text')">
      <span class="cat-icon">🦴</span>
      <div class="cat-text">
        <strong>기능해부학</strong>
        <span>기능적 해부학 구조</span>
      </div>
    </button>
  </div>
</div>

<!-- ── 화면 2: 뽑기 ── -->
<div class="screen" id="screenDraw">

  <div class="draw-header">
    <button class="back-btn" onclick="goBack()">← 과목 선택</button>
    <div class="draw-header-title">
      <h1>현재 과목</h1>
      <h2 id="selectedCategoryLabel"></h2>
    </div>
  </div>

  <!-- 설정 카드 (숫자 모드) -->
  <div class="card" id="cardNumberSettings">
    <h2>⚙️ 설정</h2>
    <div class="settings-grid" style="grid-template-columns: 1fr 1fr;">
      <div>
        <label>총 문제 수</label>
        <input type="number" id="totalCount" value="30" min="1" />
      </div>
      <div>
        <label>뽑을 문제 수</label>
        <input type="number" id="drawCount" value="3" min="1" max="10" />
      </div>
    </div>
    <div>
      <label>학생 이름/번호 (선택)</label>
      <input type="text" id="studentNameNumber" placeholder="예: 홍길동 / 1번" style="text-align:left; padding-left:12px;" />
    </div>
  </div>

  <!-- 실기문제 목록 카드 (텍스트 모드) -->
  <div class="card" id="cardTextSettings" style="display:none;">
    <div class="list-card-header" onclick="toggleItemList()">
      <h2 style="border:none; margin:0; padding:0;">📝 실기문제 목록</h2>
      <span id="listToggleIcon">▲</span>
    </div>
    <div id="itemListBody">
      <div id="adminControls" style="margin-top:14px;">
        <div class="more-wrap" style="margin-top:14px;">
          <button class="more-btn" onclick="toggleMoreMenu(event)">⋮</button>
          <div class="more-menu" id="moreMenu">
            <button class="more-menu-item" onclick="openBulkModal(); closeMoreMenu()">📋 여러 개 붙여넣기</button>
            <button class="more-menu-item" onclick="sortItems(); closeMoreMenu()">🔤 가나다 정렬</button>
            <div class="more-menu-divider"></div>
            <button class="more-menu-item danger" onclick="clearAllItems(); closeMoreMenu()">✕ 전체 삭제</button>
          </div>
        </div>
        <div class="item-add-row">
          <input type="text" id="newItemInput" placeholder="문제 이름 입력" style="text-align:left; padding-left:12px;"
            onkeydown="if(event.key==='Enter') addItem()" />
          <button class="add-btn" onclick="addItem()">+ 추가</button>
        </div>
      </div>
      <p id="itemNotice" style="font-size:0.78rem; margin-bottom:8px; min-height:1.2em;"></p>
      <div class="item-list" id="itemList">
        <p class="item-empty">불러오는 중...</p>
      </div>
      <p class="item-count" id="itemCount"></p>
    </div>
  </div>

  <!-- 일괄 입력 모달 -->
  <div class="modal-overlay" id="bulkModal">
    <div class="modal">
      <h3>📋 여러 개 붙여넣기</h3>
      <p>한 줄에 하나씩 입력하거나, Word/엑셀에서 복사해서 붙여넣으세요.</p>
      <textarea id="bulkTextarea" placeholder="예시:
삼각근
대흉근
광배근
승모근"></textarea>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeBulkModal()">취소</button>
        <button class="btn-confirm" onclick="confirmBulk()">등록</button>
      </div>
    </div>
  </div>

  <!-- 텍스트 모드 설정 -->
  <div class="card" id="cardTextDrawSettings" style="display:none;">
    <h2>⚙️ 설정</h2>
    <div class="settings-grid" style="grid-template-columns: 1fr 1fr;">
      <div>
        <label>뽑을 문제 수</label>
        <input type="number" id="drawCountText" value="3" min="1" max="10" />
      </div>
      <div>
        <label>학생 이름/번호 (선택)</label>
        <input type="text" id="studentNameText" placeholder="예: 홍길동" style="text-align:left; padding-left:12px;" />
      </div>
    </div>
  </div>

  <!-- 뽑기 카드 -->
  <div class="card">
    <div class="student-label" id="currentStudentLabel">현재 학생: —</div>
    <div class="slots" id="slotsNumber"></div>
    <div class="text-slots" id="slotsText" style="display:none;"></div>
    <button class="draw-btn active" id="drawBtn" onclick="draw()">🎯 뽑기</button>
    <button class="next-btn" id="nextBtn" onclick="nextStudent()" style="display:none;">✅ 다음 학생</button>
    <p class="notice" id="notice"></p>
  </div>

  <!-- 기록 카드 -->
  <div class="card history-card">
    <h2>📋 뽑기 기록</h2>
    <div class="card-body" id="historyList">
      <p style="color:#a0aec0; font-size:0.9rem; text-align:center; padding: 10px 0;">아직 기록이 없습니다.</p>
    </div>
    <button class="reset-btn" onclick="resetAll()">🔄 전체 초기화</button>
  </div>

</div>

<script>
  // ── Supabase 초기화 ──
  const { createClient } = supabase;
  const db = createClient(
    'https://apuqrovmutfzrcyobvif.supabase.co',
    'sb_publishable_PD9vQ5uCMV8F80np7BCKXQ_N9taMucs'
  );

  let currentPicks = [];
  let history = [];
  let selectedCategory = '';
  let categoryType = 'number';
  let textItems = []; // [{id, name}]

  // ── 카테고리 선택 ──
  async function selectCategory(name, type) {
    selectedCategory = name;
    categoryType = type;
    document.getElementById('selectedCategoryLabel').textContent = name;

    document.getElementById('cardNumberSettings').style.display = type === 'number' ? '' : 'none';
    document.getElementById('cardTextSettings').style.display = type === 'text' ? '' : 'none';
    document.getElementById('cardTextDrawSettings').style.display = type === 'text' ? '' : 'none';
    document.getElementById('slotsNumber').style.display = type === 'number' ? '' : 'none';
    document.getElementById('slotsText').style.display = type === 'text' ? '' : 'none';

    if (type === 'text') {
      await loadItemsFromDB(name);
    }

    currentPicks = [];
    history = [];
    renderSlots();
    renderHistory();
    document.getElementById('currentStudentLabel').textContent = '현재 학생: —';
    document.getElementById('notice').textContent = '';
    document.getElementById('nextBtn').style.display = 'none';
    const btn = document.getElementById('drawBtn');
    btn.className = 'draw-btn active';
    btn.onclick = draw;

    showScreen('screenDraw');
  }

  // ── Supabase에서 문제 목록 로드 ──
  async function loadItemsFromDB(category) {
    document.getElementById('itemList').innerHTML = '<p class="item-empty">불러오는 중...</p>';
    const { data, error } = await db
      .from('questions')
      .select('id, name')
      .eq('category', category)
      .order('name');
    if (error) {
      document.getElementById('itemList').innerHTML = '<p class="item-empty" style="color:#e53e3e;">불러오기 실패. 새로고침 해주세요.</p>';
      return;
    }
    textItems = data || [];
    renderItemList();
  }

  // ── 문제 추가 (관리자) ──
  async function addItem() {
    const input = document.getElementById('newItemInput');
    const val = input.value.trim();
    if (!val) return;
    if (textItems.some(i => i.name === val)) {
      setItemNotice(`"${val}"은(는) 이미 있습니다.`, true);
      input.select();
      return;
    }
    const { data, error } = await db
      .from('questions')
      .insert({ category: selectedCategory, name: val })
      .select()
      .single();
    if (error) { setItemNotice('추가 실패', true); return; }
    textItems.push(data);
    textItems.sort((a, b) => a.name.localeCompare(b.name));
    input.value = '';
    renderItemList();
    setItemNotice(`"${val}" 추가됨`, false);
    input.focus();
  }

  // ── 문제 삭제 (관리자) ──
  async function deleteItem(id) {
    const { error } = await db.from('questions').delete().eq('id', id);
    if (error) { setItemNotice('삭제 실패', true); return; }
    textItems = textItems.filter(i => i.id !== id);
    renderItemList();
  }

  // ── 전체 삭제 (관리자) ──
  async function clearAllItems() {
    if (textItems.length === 0) return;
    if (!confirm('목록을 전체 삭제할까요?')) return;
    const { error } = await db.from('questions').delete().eq('category', selectedCategory);
    if (error) { setItemNotice('삭제 실패', true); return; }
    textItems = [];
    renderItemList();
  }

  // ── 가나다 정렬 (관리자) ──
  function sortItems() {
    textItems.sort((a, b) => a.name.localeCompare(b.name));
    renderItemList();
    setItemNotice('정렬 완료', false);
  }

  // ── 일괄 추가 (관리자) ──
  async function confirmBulk() {
    const raw = document.getElementById('bulkTextarea').value;
    const parsed = raw.split(/[\n,]+/).map(s => s.trim()).filter(s => s.length > 0);
    const existingNames = textItems.map(i => i.name);
    const newNames = parsed.filter(s => !existingNames.includes(s));
    if (newNames.length === 0) {
      setItemNotice('모두 이미 있는 항목입니다.', true);
      closeBulkModal();
      return;
    }
    const inserts = newNames.map(name => ({ category: selectedCategory, name }));
    const { data, error } = await db.from('questions').insert(inserts).select();
    if (error) { setItemNotice('추가 실패', true); return; }
    textItems = [...textItems, ...data];
    textItems.sort((a, b) => a.name.localeCompare(b.name));
    renderItemList();
    closeBulkModal();
    setItemNotice(`${newNames.length}개 추가됨`, false);
  }

  // ── 목록 렌더 ──
  function setItemNotice(msg, isError) {
    const el = document.getElementById('itemNotice');
    el.textContent = msg;
    el.style.color = isError ? '#e53e3e' : '#38a169';
    if (msg) setTimeout(() => { if (el.textContent === msg) el.textContent = ''; }, 3000);
  }

  function renderItemList() {
    const list = document.getElementById('itemList');
    if (textItems.length === 0) {
      list.innerHTML = '<p class="item-empty">문제를 추가해주세요</p>';
    } else {
      list.innerHTML = textItems.map((item, i) => `
        <div class="item-row">
          <span class="item-index">${i + 1}</span>
          <span class="item-name">${item.name}</span>
          <button class="del-btn" onclick="deleteItem('${item.id}')">✕</button>
        </div>
      `).join('');
    }
    document.getElementById('itemCount').textContent = textItems.length > 0 ? `총 ${textItems.length}개` : '';
  }

  // ── 더보기 메뉴 ──
  function toggleMoreMenu(e) {
    e.stopPropagation();
    document.getElementById('moreMenu').classList.toggle('open');
  }

  function closeMoreMenu() {
    document.getElementById('moreMenu').classList.remove('open');
  }

  document.addEventListener('click', closeMoreMenu);

  // ── 모달 ──
  function openBulkModal() {
    document.getElementById('bulkTextarea').value = '';
    document.getElementById('bulkModal').classList.add('open');
    setTimeout(() => document.getElementById('bulkTextarea').focus(), 100);
  }

  function closeBulkModal() {
    document.getElementById('bulkModal').classList.remove('open');
  }

  // ── 설정 ──
  function getSettings() {
    if (categoryType === 'number') {
      const max = parseInt(document.getElementById('totalCount').value) || 30;
      const count = parseInt(document.getElementById('drawCount').value) || 3;
      return { max, count };
    } else {
      const count = parseInt(document.getElementById('drawCountText').value) || 3;
      return { count };
    }
  }

  function getStudentName() {
    const id = categoryType === 'number' ? 'studentNameNumber' : 'studentNameText';
    return document.getElementById(id).value.trim();
  }

  function clearStudentName() {
    document.getElementById('studentNameNumber').value = '';
    document.getElementById('studentNameText').value = '';
  }

  // ── 슬롯 렌더 ──
  function renderSlots() {
    const { count } = getSettings();
    if (categoryType === 'number') {
      const container = document.getElementById('slotsNumber');
      container.innerHTML = '';
      for (let i = 0; i < count; i++) {
        const div = document.createElement('div');
        div.className = 'slot' + (currentPicks[i] !== undefined ? ' filled' : '');
        div.innerHTML = `<span class="slot-num">${i + 1}</span>${currentPicks[i] !== undefined ? currentPicks[i] : '?'}`;
        container.appendChild(div);
      }
    } else {
      const container = document.getElementById('slotsText');
      container.innerHTML = '';
      for (let i = 0; i < count; i++) {
        const div = document.createElement('div');
        div.className = 'text-slot' + (currentPicks[i] !== undefined ? ' filled' : '');
        div.innerHTML = currentPicks[i] !== undefined
          ? `<span class="text-slot-num">${i + 1}</span><span class="text-slot-value">${currentPicks[i]}</span>`
          : `<span class="text-slot-num">${i + 1}</span><span class="text-slot-placeholder">뽑기 대기 중...</span>`;
        container.appendChild(div);
      }
    }
  }

  // ── 뽑기 ──
  function draw() {
    const { count } = getSettings();
    if (currentPicks.length >= count) return;

    let pool;
    if (categoryType === 'number') {
      const { max } = getSettings();
      pool = [];
      for (let n = 1; n <= max; n++) {
        if (!currentPicks.includes(n)) pool.push(n);
      }
    } else {
      if (textItems.length === 0) {
        document.getElementById('notice').textContent = '먼저 실기문제 목록을 추가해주세요.';
        return;
      }
      pool = textItems.map(i => i.name).filter(n => !currentPicks.includes(n));
    }

    if (pool.length === 0) {
      document.getElementById('notice').textContent = '뽑을 수 있는 항목이 없습니다.';
      return;
    }

    const picked = pool[Math.floor(Math.random() * pool.length)];
    currentPicks.push(picked);
    renderSlots();
    updateUI();
  }

  function updateUI() {
    const { count } = getSettings();
    const done = currentPicks.length >= count;
    const btn = document.getElementById('drawBtn');
    const nextBtn = document.getElementById('nextBtn');
    const notice = document.getElementById('notice');

    if (done) {
      btn.className = 'draw-btn disabled';
      btn.onclick = null;
      nextBtn.style.display = 'block';
      notice.textContent = `${count}개 뽑기 완료! 다음 학생 버튼을 눌러주세요.`;
    } else {
      notice.textContent = `${currentPicks.length} / ${count} 완료`;
    }

    const name = getStudentName();
    const label = name || `학생 ${history.length + 1}`;
    document.getElementById('currentStudentLabel').textContent = `현재: ${label}`;
  }

  function nextStudent() {
    const name = getStudentName();
    const label = name || `학생 ${history.length + 1}`;

    if (currentPicks.length > 0) {
      history.push({ label, picks: [...currentPicks] });
      renderHistory();
    }

    currentPicks = [];
    clearStudentName();
    document.getElementById('nextBtn').style.display = 'none';
    document.getElementById('notice').textContent = '';
    document.getElementById('currentStudentLabel').textContent = '현재 학생: —';

    const btn = document.getElementById('drawBtn');
    btn.className = 'draw-btn active';
    btn.onclick = draw;
    renderSlots();
  }

  function renderHistory() {
    const list = document.getElementById('historyList');
    if (history.length === 0) {
      list.innerHTML = '<p style="color:#a0aec0; font-size:0.9rem; text-align:center; padding:10px 0;">아직 기록이 없습니다.</p>';
      return;
    }
    list.innerHTML = history.map(h => `
      <div class="history-row">
        <span class="student-tag">${h.label}</span>
        <div class="history-picks">
          ${h.picks.map(p => `<span class="pick-badge">${p}</span>`).join('')}
        </div>
      </div>
    `).join('');
    list.scrollTop = list.scrollHeight;
  }

  function resetAll() {
    if (!confirm('모든 기록을 초기화할까요?')) return;
    currentPicks = [];
    history = [];
    clearStudentName();
    document.getElementById('notice').textContent = '';
    document.getElementById('currentStudentLabel').textContent = '현재 학생: —';
    document.getElementById('nextBtn').style.display = 'none';
    const btn = document.getElementById('drawBtn');
    btn.className = 'draw-btn active';
    btn.onclick = draw;
    renderSlots();
    renderHistory();
  }

  function goBack() {
    if (history.length > 0 && !confirm('과목 선택으로 돌아가면 현재 기록이 사라집니다. 계속할까요?')) return;
    showScreen('screenCategory');
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  let itemListOpen = true;
  function toggleItemList() {
    itemListOpen = !itemListOpen;
    document.getElementById('itemListBody').style.display = itemListOpen ? '' : 'none';
    document.getElementById('listToggleIcon').textContent = itemListOpen ? '▲' : '▼';
  }

  document.getElementById('drawCount').addEventListener('input', () => { currentPicks = []; renderSlots(); });
  document.getElementById('drawCountText').addEventListener('input', () => { currentPicks = []; renderSlots(); });

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
</script>
</body>
</html>
