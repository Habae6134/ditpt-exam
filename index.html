<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>실기시험 제비뽑기</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="제비뽑기" />
  <meta name="theme-color" content="#3182ce" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a365d;
      margin-bottom: 20px;
      text-align: center;
    }

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      padding: 24px;
      width: 100%;
      max-width: 480px;
      margin-bottom: 16px;
    }

    .card h2 {
      font-size: 1rem;
      color: #4a5568;
      margin-bottom: 14px;
      border-bottom: 2px solid #e2e8f0;
      padding-bottom: 8px;
    }

    .settings-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    label {
      font-size: 0.8rem;
      color: #718096;
      display: block;
      margin-bottom: 4px;
    }

    input[type="number"], input[type="text"] {
      width: 100%;
      padding: 10px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 1rem;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #4299e1; }

    .student-label {
      text-align: center;
      font-size: 1.1rem;
      color: #2d3748;
      margin-bottom: 16px;
      font-weight: bold;
    }

    .slots {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-bottom: 20px;
    }

    .slot {
      width: 80px;
      height: 80px;
      border-radius: 14px;
      border: 3px dashed #cbd5e0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      font-weight: bold;
      color: #a0aec0;
      background: #f7fafc;
      transition: all 0.3s;
      position: relative;
    }

    .slot.filled {
      border-style: solid;
      border-color: #4299e1;
      background: #ebf8ff;
      color: #2b6cb0;
      animation: popIn 0.3s ease;
    }

    @keyframes popIn {
      0% { transform: scale(0.6); opacity: 0; }
      70% { transform: scale(1.15); }
      100% { transform: scale(1); opacity: 1; }
    }

    .slot-num {
      position: absolute;
      top: 4px;
      left: 8px;
      font-size: 0.6rem;
      color: #90cdf4;
    }

    .draw-btn {
      width: 100%;
      padding: 18px;
      font-size: 1.2rem;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 1px;
    }

    .draw-btn.active {
      background: linear-gradient(135deg, #3182ce, #2b6cb0);
      color: white;
      box-shadow: 0 4px 14px rgba(49,130,206,0.4);
    }

    .draw-btn.active:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(49,130,206,0.45); }
    .draw-btn.active:active { transform: translateY(0); }

    .draw-btn.disabled {
      background: #e2e8f0;
      color: #a0aec0;
      cursor: not-allowed;
    }

    .next-btn {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      font-size: 1rem;
      font-weight: bold;
      border: 2px solid #38a169;
      border-radius: 12px;
      background: white;
      color: #38a169;
      cursor: pointer;
      transition: all 0.2s;
    }

    .next-btn:hover { background: #f0fff4; }

    .history-card .card-body {
      max-height: 260px;
      overflow-y: auto;
    }

    .history-row {
      display: flex;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
      gap: 10px;
      font-size: 0.95rem;
    }

    .history-row:last-child { border-bottom: none; }

    .student-tag {
      background: #ebf8ff;
      color: #2b6cb0;
      border-radius: 6px;
      padding: 2px 8px;
      font-weight: bold;
      font-size: 0.85rem;
      white-space: nowrap;
    }

    .history-nums {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .num-badge {
      background: #4299e1;
      color: white;
      border-radius: 8px;
      padding: 2px 10px;
      font-weight: bold;
      font-size: 0.9rem;
    }

    .reset-btn {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      font-size: 0.85rem;
      border: 1px solid #fc8181;
      border-radius: 8px;
      background: white;
      color: #e53e3e;
      cursor: pointer;
      transition: all 0.2s;
    }

    .reset-btn:hover { background: #fff5f5; }

    .notice {
      font-size: 0.78rem;
      color: #a0aec0;
      text-align: center;
      margin-top: 6px;
    }

    @media (max-width: 400px) {
      .slot { width: 65px; height: 65px; font-size: 1.3rem; }
      .settings-grid { grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
    }
  </style>
</head>
<body>

<h1>🎓 실기시험 제비뽑기</h1>

<!-- 설정 카드 -->
<div class="card">
  <h2>⚙️ 설정</h2>
  <div class="settings-grid">
    <div>
      <label>문제 시작번호</label>
      <input type="number" id="rangeMin" value="1" min="1" />
    </div>
    <div>
      <label>문제 끝번호</label>
      <input type="number" id="rangeMax" value="30" min="1" />
    </div>
    <div>
      <label>뽑기 수</label>
      <input type="number" id="drawCount" value="3" min="1" max="10" />
    </div>
  </div>
  <div>
    <label>학생 이름/번호 (선택)</label>
    <input type="text" id="studentName" placeholder="예: 홍길동 / 1번" style="text-align:left; padding-left:12px;" />
  </div>
</div>

<!-- 뽑기 카드 -->
<div class="card">
  <div class="student-label" id="currentStudentLabel">현재 학생: —</div>
  <div class="slots" id="slots"></div>
  <button class="draw-btn active" id="drawBtn" onclick="draw()">🎯 뽑기</button>
  <button class="next-btn" id="nextBtn" onclick="nextStudent()" style="display:none;">
    ✅ 다음 학생
  </button>
  <p class="notice" id="notice"></p>
</div>

<!-- 기록 카드 -->
<div class="card history-card">
  <h2>📋 뽑기 기록</h2>
  <div class="card-body" id="historyList">
    <p style="color:#a0aec0; font-size:0.9rem; text-align:center; padding: 10px 0;">아직 기록이 없습니다.</p>
  </div>
  <button class="reset-btn" onclick="resetAll()">🔄 전체 초기화</button>
</div>

<script>
  let currentPicks = [];
  let history = [];
  let drawsAllowed = 3;

  function getSettings() {
    const min = parseInt(document.getElementById('rangeMin').value) || 1;
    const max = parseInt(document.getElementById('rangeMax').value) || 30;
    const count = parseInt(document.getElementById('drawCount').value) || 3;
    return { min, max, count };
  }

  function renderSlots() {
    const { count } = getSettings();
    drawsAllowed = count;
    const container = document.getElementById('slots');
    container.innerHTML = '';
    for (let i = 0; i < count; i++) {
      const div = document.createElement('div');
      div.className = 'slot' + (currentPicks[i] !== undefined ? ' filled' : '');
      div.innerHTML = `<span class="slot-num">${i + 1}</span>${currentPicks[i] !== undefined ? currentPicks[i] : '?'}`;
      container.appendChild(div);
    }
  }

  function draw() {
    const { min, max, count } = getSettings();
    if (currentPicks.length >= count) return;

    const pool = [];
    for (let n = min; n <= max; n++) {
      if (!currentPicks.includes(n)) pool.push(n);
    }

    if (pool.length === 0) {
      document.getElementById('notice').textContent = '뽑을 수 있는 번호가 없습니다.';
      return;
    }

    const picked = pool[Math.floor(Math.random() * pool.length)];
    currentPicks.push(picked);
    renderSlots();
    updateUI();
  }

  function updateUI() {
    const { count } = getSettings();
    const done = currentPicks.length >= count;
    const btn = document.getElementById('drawBtn');
    const nextBtn = document.getElementById('nextBtn');
    const notice = document.getElementById('notice');

    if (done) {
      btn.className = 'draw-btn disabled';
      btn.onclick = null;
      nextBtn.style.display = 'block';
      notice.textContent = `${count}개 뽑기 완료! 다음 학생 버튼을 눌러주세요.`;
    } else {
      notice.textContent = `${currentPicks.length} / ${count} 완료`;
    }

    const nameInput = document.getElementById('studentName').value.trim();
    const label = nameInput || `학생 ${history.length + 1}`;
    document.getElementById('currentStudentLabel').textContent = `현재: ${label}`;
  }

  function nextStudent() {
    const { count } = getSettings();
    const nameInput = document.getElementById('studentName').value.trim();
    const label = nameInput || `학생 ${history.length + 1}`;

    if (currentPicks.length > 0) {
      history.push({ label, picks: [...currentPicks] });
      renderHistory();
    }

    currentPicks = [];
    document.getElementById('studentName').value = '';
    document.getElementById('nextBtn').style.display = 'none';
    document.getElementById('notice').textContent = '';
    document.getElementById('currentStudentLabel').textContent = '현재 학생: —';

    const btn = document.getElementById('drawBtn');
    btn.className = 'draw-btn active';
    btn.onclick = draw;

    renderSlots();
  }

  function renderHistory() {
    const list = document.getElementById('historyList');
    if (history.length === 0) {
      list.innerHTML = '<p style="color:#a0aec0; font-size:0.9rem; text-align:center; padding:10px 0;">아직 기록이 없습니다.</p>';
      return;
    }
    list.innerHTML = history.map((h, i) => `
      <div class="history-row">
        <span class="student-tag">${h.label}</span>
        <div class="history-nums">
          ${h.picks.map(p => `<span class="num-badge">${p}</span>`).join('')}
        </div>
      </div>
    `).join('');
    list.scrollTop = list.scrollHeight;
  }

  function resetAll() {
    if (!confirm('모든 기록을 초기화할까요?')) return;
    currentPicks = [];
    history = [];
    document.getElementById('studentName').value = '';
    document.getElementById('notice').textContent = '';
    document.getElementById('currentStudentLabel').textContent = '현재 학생: —';
    document.getElementById('nextBtn').style.display = 'none';
    const btn = document.getElementById('drawBtn');
    btn.className = 'draw-btn active';
    btn.onclick = draw;
    renderSlots();
    renderHistory();
  }

  // 설정 변경 시 슬롯 재렌더
  document.getElementById('drawCount').addEventListener('input', () => {
    currentPicks = [];
    renderSlots();
  });

  // 초기 렌더
  renderSlots();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
</script>
</body>
</html>
